name: Scheduled Code Review Issues

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 9:00 AM UTC -- adjust as needed
  workflow_dispatch:        # lets you also trigger it manually from the Actions tab

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run Groq code review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/groq_code_review.py
