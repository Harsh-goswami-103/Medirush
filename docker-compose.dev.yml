services:
  postgres:
    image: postgres:16
    container_name: medrush-pg
    environment:
      POSTGRES_USER: medrush
      POSTGRES_PASSWORD: medrush
      POSTGRES_DB: medrush
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medrush -d medrush"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
